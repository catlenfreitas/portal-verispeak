<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Verispeak</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* FUNDO COM CORES DA ESCOLA */
      background: linear-gradient(135deg, #0e47a1, #1f90ff, #0abcd4);
    }

    .container {
      background: #feffff;
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 80px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0;
      color: #0e47a1;
    }

    p {
      color: #555;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus {
      border-color: #1f90ff;
      box-shadow: 0 0 5px #91b8e8;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(90deg, #0abcd4, #1f90ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.03);
      background: linear-gradient(90deg, #1f90ff, #0e47a1);
    }

    .msg {
      margin-top: 15px;
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- LOGO -->
    <img src="logo.escola.png" class="logo">

    <h2>Verispeak</h2>
    <p>Pronto para aprender algo novo hoje? 👋</p>

    <input type="email" id="email" placeholder="Seu e-mail">
    <input type="password" id="senha" placeholder="Sua senha">

    <button onclick="login()">Entrar</button>

    <p class="msg" id="msg"></p>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      document.getElementById('msg').innerText = 'Carregando...';

      try {
        const response = await fetch('https://verispeak-backend.onrender.com/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (!response.ok) {
          document.getElementById('msg').innerText = data.error;
          return;
        }

        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';

      } catch (error) {
        document.getElementById('msg').innerText = 'Erro ao conectar com servidor';
      }
    }
  </script>

</body>
</html>
