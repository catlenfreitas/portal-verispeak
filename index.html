<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Verispeak</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1e90ff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .msg {
      margin-top: 10px;
      color: red;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Login do Aluno</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <p class="msg" id="msg"></p>
  </div>

  <script>
    async function login() {
  console.log("clicou no botão");

  const email = document.getElementById('email').value;
  const senha = document.getElementById('senha').value;

  document.getElementById('msg').innerText = 'Carregando...';

  try {
    console.log("enviando request...");

    const response = await fetch('https://verispeak-backend.onrender.com/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ email, senha })
    });

    console.log("resposta recebida");

    const data = await response.json();
    console.log("dados:", data);

    if (!response.ok) {
      document.getElementById('msg').innerText = data.error;
      return;
    }

    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = 'dashboard.html';

  } catch (error) {
    console.log("erro:", error);
    document.getElementById('msg').innerText = 'Erro ao conectar com servidor';
  }
}
 
  </script>

</body>
</html>
