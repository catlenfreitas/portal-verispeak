<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Área do Aluno</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding: 50px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
    }

    a {
      display: block;
      margin-top: 20px;
      padding: 10px;
      background: #1e90ff;
      color: white;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2 id="nome"></h2>
    <p>Bem-vindo à sua área de estudos Veristudent!</p>

    <a href="https://western-planet-8fb.notion.site/Verispeak-3436476a63ab80438a7edf744805f3e1?source=copy_link" target="_blank">
      Acessar aulas
    </a>
  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));

    if (!user) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('nome').innerText = "Olá, " + user.nome;
    }
  </script>

</body>
</html>
