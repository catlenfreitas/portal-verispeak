<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login | Verispeak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <img src="logo.escola.png" class="logo" alt="Verispeak">
        <p>Pronto para aprender algo novo hoje?</p>
      </div>

      <div class="form-body">
        <div class="input-group">
          <label for="email">E-mail</label>
          <div class="input-field">
            <i class="fa fa-envelope"></i>
            <input type="email" id="email" placeholder="exemplo@email.com">
          </div>
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <div class="input-field">
            <i class="fa fa-lock"></i>
            <input type="password" id="senha" placeholder="Sua senha secreta">
            <i class="fa fa-eye toggle-password" onclick="toggleSenha()"></i>
          </div>
        </div>

        <div class="forgot-pass">
          <a href="#">Esqueceu a senha?</a>
        </div>

        <button id="btnLogin" class="btn-main" onclick="login()">
          <span class="btn-text">Entrar na plataforma</span>
          <div class="loader"></div>
        </button>

        <p class="msg" id="msg"></p>
      </div>

      <div class="login-footer">
        Não tem uma conta? <a href="https://wa.me/5511992560534">Fale com o suporte</a>
      </div>
    </div>
  </div>

  <script>
    function toggleSenha() {
      const input = document.getElementById('senha');
      const icon = document.querySelector('.toggle-password');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    async function login() {
      const btn = document.getElementById('btnLogin');
      const msg = document.getElementById('msg');
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      if(!email || !senha) {
        msg.innerText = "Preencha todos os campos.";
        return;
      }

      msg.innerText = '';
      btn.classList.add('loading');

      try {
        const response = await fetch('https://verispeak-backend.onrender.com/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (!response.ok) {
          msg.innerText = data.error;
          btn.classList.remove('loading');
          return;
        }

        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';

      } catch (error) {
        msg.innerText = 'Erro ao conectar com servidor';
        btn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
