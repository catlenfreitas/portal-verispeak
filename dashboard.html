<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Área do Aluno - Verispeak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0e47a1, #1f90ff, #0abcd4);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      border-radius: 20px;
      padding: 30px;
      width: 350px;
      max-width: 100%;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .logo {
      width: 80px;
      margin-bottom: 10px;
    }

    h2 {
      color: #0e47a1;
      margin-bottom: 5px;
    }

    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 25px;
    }

    .card {
      background: #f8fbff;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: left;
    }

    .card h3 {
      margin: 0;
      color: #0e47a1;
      font-size: 16px;
    }

    .card p {
      margin: 5px 0 0;
      font-size: 13px;
      color: #777;
    }

    .btn {
      display: block;
      margin-top: 20px;
      padding: 14px;
      border-radius: 30px;
      background: linear-gradient(90deg, #0abcd4, #1f90ff);
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .logout {
      margin-top: 15px;
      font-size: 13px;
      color: #999;
      cursor: pointer;
    }

    .logout:hover {
      color: #333;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="logo.escola.png" class="logo">

    <h2 id="nome"></h2>
    <p>Bem-vindo à sua área de estudos 🚀</p>

    <div class="card">
      <h3>📚 Suas aulas</h3>
      <p>Acesse seus conteúdos e continue aprendendo</p>
    </div>

    <a class="btn" href="https://western-planet-8fb.notion.site/Verispeak-3436476a63ab80438a7edf744805f3e1?source=copy_link" target="_blank">
      Acessar plataforma
    </a>

    <div class="logout" onclick="logout()">Sair</div>

  </div>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));

    if (!user) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('nome').innerText = "Olá, " + user.nome;
    }

    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    }
  </script>

</body>
</html>
